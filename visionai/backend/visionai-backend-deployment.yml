apiVersion: apps/v1
kind: Deployment
metadata:
  name: visionai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visionai-backend
  template:
    metadata:
      labels:
        app: visionai-backend
    spec:
      containers:
        - name: visionai-backend
          image: oryprojectsdocker/visionai-backend:
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
